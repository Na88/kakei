name: Claude Auto Update

on:
  issues:
    types: [opened]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Claude update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/workflows/update.py

      - name: Commit changes
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 Claude: ${{ github.event.issue.title }}"
          git push

      - name: Close issue with comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "✅ 変更を反映しました！ https://Na88.github.io/kakei/"
          gh issue close ${{ github.event.issue.number }}
